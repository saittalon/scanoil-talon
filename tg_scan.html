<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Сканер талонов</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0;background:#0b1320;color:#fff}
    .wrap{max-width:520px;margin:0 auto;padding:16px}
    .card{background:#111c30;border-radius:18px;padding:16px;box-shadow:0 10px 40px rgba(0,0,0,.35)}
    h1{font-size:20px;margin:0 0 10px}
    p{margin:0 0 12px;opacity:.9}
    .video-wrap{position:relative;border-radius:16px;overflow:hidden;background:#000}
    video{width:100%;height:auto;display:block}
    .frame{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
    .box{width:70%;aspect-ratio:1/1;border:3px solid rgba(255,255,255,.85);border-radius:18px;box-shadow:0 0 0 9999px rgba(0,0,0,.25)}
    .status{margin-top:12px;padding:10px 12px;border-radius:14px;background:#0f1a2e}
    .btn{width:100%;margin-top:12px;padding:12px 14px;border-radius:14px;border:0;background:#24a148;color:#fff;font-weight:700;font-size:16px}
    .btn:disabled{opacity:.6}
    .muted{opacity:.8;font-size:13px;margin-top:8px}
    .err{color:#ffb4b4}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>📷 Сканирование талона</h1>
      <p>Наведите камеру на QR‑код талона. Сканирование произойдёт автоматически.</p>

      <div class="video-wrap">
        <video id="video" playsinline></video>
        <div class="frame"><div class="box"></div></div>
      </div>

      <div id="status" class="status">Подготовка камеры…</div>
      <div id="summary" class="muted" style="margin-top:10px;">Сканировано: <b id="count">0</b></div>
      <div id="list" class="status" style="margin-top:10px;display:none;max-height:180px;overflow:auto;"></div>
      <button id="finish" class="btn" style="background:#3b82f6;margin-top:12px;">Завершить</button>
      <button id="retry" class="btn" style="display:none;">Повторить</button>
      <div class="muted">Поддерживается пакетное сканирование: после успешного талона камера продолжит работать и можно сканировать следующий.</div>
    </div>
  </div>

<script>
const TOKEN = {{ token|tojson }};
const statusEl = document.getElementById('status');
const video = document.getElementById('video');
const retryBtn = document.getElementById('retry');
const finishBtn = document.getElementById('finish');
const listEl = document.getElementById('list');
const countEl = document.getElementById('count');

function setStatus(text, isErr=false){
  statusEl.textContent = text;
  statusEl.classList.toggle('err', isErr);
}

let stream = null;
let detector = null;
let scanning = false;
let inFlight = false;

const seen = new Map(); // code -> ts
let okCount = 0;

function addToList(kind, text){
  const ts = new Date().toLocaleTimeString();
  if(listEl.style.display === 'none') listEl.style.display = 'block';
  const div = document.createElement('div');
  div.style.padding = '8px 10px';
  div.style.borderRadius = '12px';
  div.style.marginBottom = '8px';
  div.style.background = kind === 'ok' ? 'rgba(36,161,72,.15)' : 'rgba(255,180,180,.12)';
  div.innerHTML = `<b>${ts}</b> — ${text}`;
  listEl.prepend(div);
}

function bumpCount(){
  countEl.textContent = String(okCount);
}

async function startCamera(){
  retryBtn.style.display = 'none';
  try{
    setStatus('Открываю камеру…');
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio:false });
    video.srcObject = stream;
    await video.play();

    if ('BarcodeDetector' in window){
      detector = new BarcodeDetector({formats:['qr_code']});
      setStatus('Готово. Наведите на QR…');
      scanning = true;
      scanLoop();
    } else {
      setStatus('Ваше устройство не поддерживает быстрый сканер (BarcodeDetector). Откройте эту страницу в Chrome/Android.', true);
      retryBtn.style.display = 'block';
    }
  } catch(e){
    console.error(e);
    setStatus('Не удалось открыть камеру. Разрешите доступ к камере и нажмите "Повторить".', true);
    retryBtn.style.display = 'block';
  }
}

function normalizeCode(raw){
  let code = (raw || '').trim();
  const m = code.match(/(\d{6,})/);
  if(m) code = m[1];
  return code;
}

function cleanupSeen(){
  const now = Date.now();
  for(const [k,ts] of seen.entries()){
    if(now - ts > 15000) seen.delete(k); // 15 сек
  }
}

async function scanLoop(){
  if(!scanning) return;

  cleanupSeen();

  if(!inFlight){
    try{
      const codes = await detector.detect(video);
      if(codes && codes.length){
        const raw = (codes[0].rawValue || '').trim();
        const code = normalizeCode(raw);

        // дебаунс: не принимать один и тот же код каждые кадры
        const now = Date.now();
        const last = seen.get(code);
        if(code && (!last || (now - last) > 2500)){
          seen.set(code, now);
          inFlight = true;
          setStatus('Проверяю талон…');
          await submitCode(code);
          setStatus('Готово. Наведите на следующий QR…');
          inFlight = false;
        }
      }
    } catch(e){
      console.error(e);
    }
  }

  requestAnimationFrame(scanLoop);
}

async function submitCode(code){
  try{
    const res = await fetch('/tg/api/scan', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({token: TOKEN, code})
    });
    const data = await res.json().catch(()=>({ok:false,error:'bad_json'}));

    if(res.ok && data.ok){
      okCount += 1;
      bumpCount();
      addToList('ok', `✅ Принят: <b>${code}</b>${data.liters ? ' — ' + data.liters + ' л' : ''}${data.agzs ? ' — ' + data.agzs : ''}`);
      // лёгкая вибрация (если доступно)
      try{ navigator.vibrate && navigator.vibrate(50); }catch(e){}
      return;
    }

    if(data.error === 'already_used'){
      addToList('err', `⚠️ Уже использован: <b>${code}</b>${data.agzs ? ' — ' + data.agzs : ''}`);
    } else if(data.error === 'talon_not_found'){
      addToList('err', `❌ Не найден: <b>${code}</b>`);
    } else if(data.error === 'token_expired' || data.error === 'not_logged_in'){
      addToList('err', `❌ Сессия истекла. Вернитесь в бот и нажмите "Сканировать" ещё раз.`);
      scanning = false;
      retryBtn.style.display = 'block';
      setStatus('Сессия истекла.', true);
      return;
    } else if(data.error === 'missing_token_or_code'){
      addToList('err', `❌ Пустой код.`);
    } else {
      addToList('err', `❌ Ошибка при закрытии: <b>${code}</b>`);
    }
  } catch(e){
    console.error(e);
    addToList('err', `❌ Ошибка сети при закрытии: <b>${code}</b>`);
  }
}

function stopCamera(){
  scanning = false;
  try{
    if(stream){
      stream.getTracks().forEach(t=>t.stop());
      stream = null;
    }
  }catch(e){}
}

retryBtn.addEventListener('click', ()=>{
  stopCamera();
  inFlight = false;
  startCamera();
});

finishBtn.addEventListener('click', ()=>{
  stopCamera();
  const msg = okCount ? `✅ Готово. Закрыто талонов: ${okCount}` : 'Готово.';
  setStatus(msg);
  // если открыто внутри Telegram WebApp — закрыть
  try{
    if(window.Telegram && Telegram.WebApp){
      Telegram.WebApp.close();
    }
  }catch(e){}
});

bumpCount();
startCamera();
</script>
</body>
</html>
