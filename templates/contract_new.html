{% extends "base.html" %}
{% block content %}
{% include "_client_header.html" %}

<div class="card card-soft">
  <div class="card-body">
    <h5 class="mb-3">Новый договор</h5>

    <form method="post"
          enctype="multipart/form-data"
          action="{{ url_for('clients.contract_new_post', client_id=client.id) }}">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Договор *</label>
          <input class="form-control" name="number" required>
        </div>

        <div class="col-md-3">
          <label class="form-label">от *</label>
          <input class="form-control" type="date" name="date_from" required>
        </div>

        <div class="col-md-3">
          <label class="form-label">до</label>
          <input class="form-control" type="date" name="date_to">
        </div>

        <div class="col-md-6">
          <label class="form-label">Тариф</label>
          <input class="form-control" name="tariff_name" placeholder="[570] Газ 60тг">
        </div>

        <div class="col-md-2">
          <label class="form-label">Цена (тг/л)</label>
          <input class="form-control" name="price_per_liter" placeholder="102.00">
        </div>

        <div class="col-md-4 d-flex align-items-end">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="online" id="online">
            <label class="form-check-label" for="online">Online</label>
          </div>
        </div>

        <div class="col-md-6">
          <label class="form-label">PDF договора (не обязательно)</label>
          <input class="form-control" type="file" name="contract_pdf" accept="application/pdf">
          <div class="form-text">Только PDF</div>
        </div>

        <div class="col-md-6">
          <label class="form-label">Группы АЗС</label>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="allow_all_stations" id="allowAll" checked>
            <label class="form-check-label" for="allowAll">Разрешён на всех АЗС</label>
          </div>
        </div>

        <div class="col-md-6">
          <label class="form-label">Запрещённые группы АЗС</label>
          <input class="form-control" name="forbidden_groups">
        </div>

        <div class="col-12 d-flex gap-2">
          <button class="btn btn-success px-4">Сохранить</button>
          <a class="btn btn-link" href="{{ url_for('clients.client_contracts', client_id=client.id) }}">Отменить</a>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
