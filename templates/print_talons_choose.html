{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <div>
    <h3 class="mb-0">Печать талонов</h3>
    <div class="text-muted small">Клиент: {{ client.name }}</div>
  </div>
  <a class="btn btn-outline-secondary" href="{{ url_for('clients.client_talons', client_id=client.id) }}">← Назад</a>
</div>

<div class="card">
  <div class="card-body">
    {% if not periods %}
      <div class="alert alert-warning mb-0">У клиента пока нет созданных талонов.</div>
    {% else %}
      <label class="form-label">Выбери период (как при создании талонов)</label>
      <select class="form-select" id="periodSelect">
        <option value="">Все периоды</option>
        {% for p in periods %}
          <option value="{{ p.valid_from }}|{{ p.valid_to }}">{{ p.valid_from }} — {{ p.valid_to }}</option>
        {% endfor %}
      </select>

      <div class="mt-3 d-flex gap-2">
        <a id="openPdfBtn" class="btn btn-dark" target="_blank"
           href="{{ url_for('clients.print_talons_pdf', client_id=client.id) }}">
          Открыть PDF (A4)
        </a>
        <span class="text-muted small align-self-center">Откроется в новой вкладке</span>
      </div>
    {% endif %}
  </div>
</div>

<script>
(function(){
  const sel = document.getElementById('periodSelect');
  const btn = document.getElementById('openPdfBtn');
  if (!sel || !btn) return;

  const baseUrl = "{{ url_for('clients.print_talons_pdf', client_id=client.id) }}";

  function updateLink(){
    const v = sel.value || "";
    if (!v) {
      btn.href = baseUrl;
      return;
    }
    const parts = v.split("|");
    const df = encodeURIComponent(parts[0] || "");
    const dt = encodeURIComponent(parts[1] || "");
    btn.href = baseUrl + "?date_from=" + df + "&date_to=" + dt;
  }

  sel.addEventListener('change', updateLink);
  updateLink();
})();
</script>
{% endblock %}
