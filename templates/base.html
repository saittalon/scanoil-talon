<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "SCAN OIL — Кабинет" }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet">
</head>
<body class="bg-app">

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top">
  <div class="container-fluid px-4">
    <a class="navbar-brand d-flex align-items-center gap-2" href="/"><img src="{{ url_for('static', filename='img/company_logo.png') }}" alt="МурАз" style="height:32px;"><span class="fw-semibold">МурАз</span></a>

    <form class="d-none d-lg-flex ms-3 flex-grow-1" role="search">
      <div class="search-wrap w-100">
        <input class="form-control search-input" type="search" placeholder="Поиск" aria-label="Search" disabled>
      </div>
    </form>

    <div class="ms-auto d-flex align-items-center gap-3">
      <a class="btn btn-link text-decoration-none small" href="/reports">Отчёты</a>
      <div class="text-muted small d-none d-md-block"><b>{{ current_user.username }}</b></div>
      <a class="btn btn-link text-decoration-none small" href="/logout">Выход</a>
    </div>
  </div>
</nav>

<div class="container-fluid px-4 py-3">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} mb-3">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
