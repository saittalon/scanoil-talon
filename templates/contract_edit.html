{% extends "base.html" %}
{% block content %}
{% include "_client_header.html" %}

<div class="card card-soft">
  <div class="card-body">
    <div class="d-flex align-items-start justify-content-between gap-3">
      <div>
        <h5 class="mb-1">Редактирование договора</h5>
        <div class="text-muted small">{{ contract.number }}</div>
      </div>
      <a class="btn btn-link" href="{{ url_for('clients.client_contracts', client_id=client.id, id=contract.id) }}">Назад</a>
    </div>

    <hr>

    <form method="post" action="{{ url_for('clients.contract_edit_post', client_id=client.id, contract_id=contract.id) }}">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Договор *</label>
          <input class="form-control" name="number" value="{{ contract.number }}" required>
        </div>
        <div class="col-md-3">
          <label class="form-label">от *</label>
          <input class="form-control" type="date" name="date_from" value="{{ contract.date_from }}" required>
        </div>
        <div class="col-md-3">
          <label class="form-label">до</label>
          <input class="form-control" type="date" name="date_to" value="{{ contract.date_to or '' }}">
        </div>

        <div class="col-md-6">
          <label class="form-label">Тариф</label>
          <input class="form-control" name="tariff_name" value="{{ contract.tariff_name or '' }}" placeholder="[570] Газ 60тг">
        </div>
        <div class="col-md-2">
          <label class="form-label">Цена (тг/л)</label>
          <input class="form-control" name="price_per_liter" value="{{ '%.2f'|format(contract.price_per_liter) if contract.price_per_liter is not none else '' }}" placeholder="102.00">
        </div>
        <div class="col-md-4 d-flex align-items-end">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="online" id="online" {% if contract.online %}checked{% endif %}>
            <label class="form-check-label" for="online">Online</label>
          </div>
        </div>

        <div class="col-md-6">
          <label class="form-label">Группы АЗС</label>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="allow_all_stations" id="allowAll" {% if contract.allow_all_stations %}checked{% endif %}>
            <label class="form-check-label" for="allowAll">Разрешён на всех АЗС</label>
          </div>
        </div>

        <div class="col-md-6">
          <label class="form-label">Запрещённые группы АЗС</label>
          <input class="form-control" name="forbidden_groups" value="{{ contract.forbidden_groups or '' }}">
        </div>

        <div class="col-12 d-flex gap-2">
          <button class="btn btn-success px-4">Сохранить</button>
          <a class="btn btn-link" href="{{ url_for('clients.client_contracts', client_id=client.id, id=contract.id) }}">Отменить</a>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
