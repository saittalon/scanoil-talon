<div class="client-head card card-soft mb-4">
  <div class="card-body">
    <div class="d-flex align-items-start justify-content-between gap-3 flex-wrap">
      <div>
        <div class="d-flex align-items-center gap-2">
          <span class="status-dot"></span>
          <div class="h4 mb-0">{{ client.name }}</div>
        </div>
        <div class="text-muted small mt-2">{{ client.full_name or 'Карточка клиента' }}</div>
        {% if client.comment %}<div class="text-muted small mt-1">{{ client.comment }}</div>{% endif %}
      </div>
      <div class="d-flex gap-2 flex-wrap">
        <span class="pill-stat">Договоров: {{ client.contracts|length }}</span>
        <span class="pill-stat">Талонов: {{ client.talons|length }}</span>
        <span class="pill-stat">Остатков: {{ client.balances|length }}</span>
      </div>
    </div>

    <div class="client-tabs mt-3">
      <a class="tab {{ 'active' if active_tab=='talons' else '' }}" href="{{ tabs.talons }}">Талоны <span class="tab-count">({{ client.talons|length }})</span></a>
      <a class="tab {{ 'active' if active_tab=='profile' else '' }}" href="{{ tabs.profile }}">Профиль</a>
      <a class="tab {{ 'active' if active_tab=='contract' else '' }}" href="{{ tabs.contract }}">Договоры</a>
      <a class="tab {{ 'active' if active_tab=='reports' else '' }}" href="{{ tabs.reports }}">Отчёты</a>
    </div>
  </div>
</div>
