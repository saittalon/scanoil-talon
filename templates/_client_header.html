<div class="client-head card card-soft mb-3">
  <div class="card-body">
    <div class="d-flex align-items-start justify-content-between gap-3">
      <div>
        <div class="d-flex align-items-center gap-2">
          <span class="status-dot"></span>
          <div class="h5 mb-0">{{ client.name }}</div>
        </div>
        <div class="text-muted small">{{ client.full_name or "" }}</div>
        <div class="text-muted small">{{ client.comment or "" }}</div>
      </div>
      <div>
        <button class="btn btn-danger btn-sm" disabled>Удалить клиента</button>
      </div>
    </div>

    <div class="client-tabs mt-3">
      <a class="tab {{ 'active' if active_tab=='talons' else '' }}" href="{{ tabs.talons }}">Талоны <span class="tab-count">({{ client.talons|length }})</span></a>
      <a class="tab {{ 'active' if active_tab=='profile' else '' }}" href="{{ tabs.profile }}">Профиль</a>
      <a class="tab {{ 'active' if active_tab=='contract' else '' }}" href="{{ tabs.contract }}">Договор</a>
      <a class="tab {{ 'active' if active_tab=='reports' else '' }}" href="{{ tabs.reports }}">Отчёты</a>
    </div>
  </div>
</div>
