{% extends "base.html" %}
{% block content %}
<div class="page-hero">
  <div class="hero-kicker">Новый клиент</div>
  <div class="hero-title">Добавление клиента в систему СУГ</div>
  <div class="hero-subtitle">Форма стала аккуратнее и легче для заполнения. Ниже можно сразу указать реквизиты, контакты и комментарии.</div>
</div>

<div class="card card-soft section-card">
  <form method="post" action="/clients/new">
    <div class="row g-3">
      <div class="col-md-8">
        <label class="form-label">Название в системе *</label>
        <input class="form-control" name="name" placeholder="Например: ТОО МурАз" required>
      </div>
      <div class="col-md-4">
        <label class="form-label">Полное название</label>
        <input class="form-control" name="full_name" placeholder="Официальное название клиента">
      </div>

      <div class="col-md-3"><label class="form-label">БИН</label><input class="form-control" name="bin"></div>
      <div class="col-md-3"><label class="form-label">КПП</label><input class="form-control" name="kpp"></div>
      <div class="col-md-3"><label class="form-label">ОГРН</label><input class="form-control" name="ogrn"></div>
      <div class="col-md-3"><label class="form-label">ОКПО</label><input class="form-control" name="okpo"></div>

      <div class="col-12"><label class="form-label">Юридический адрес</label><input class="form-control" name="legal_address"></div>
      <div class="col-12"><label class="form-label">Фактический адрес</label><input class="form-control" name="fact_address"></div>
      <div class="col-12"><label class="form-label">Почтовый адрес</label><input class="form-control" name="post_address"></div>

      <div class="col-md-6"><label class="form-label">Телефон</label><input class="form-control" name="phone"></div>
      <div class="col-md-6"><label class="form-label">E-mail</label><input class="form-control" name="email"></div>

      <div class="col-12"><label class="form-label">Комментарий</label><textarea class="form-control" name="comment" rows="4" placeholder="Дополнительная информация по клиенту"></textarea></div>

      <div class="col-12 d-flex gap-2 flex-wrap mt-2">
        <button class="btn btn-brand px-4">Сохранить клиента</button>
        <a class="btn btn-outline-secondary" href="/clients">Отменить</a>
      </div>
    </div>
  </form>
</div>
{% endblock %}
